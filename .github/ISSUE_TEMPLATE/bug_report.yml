name: "Bug report"
description: "Report a bug to help us improve Pixel Agents."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
      placeholder: "e.g., Characters freeze after switching terminals."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: "List exact steps to reproduce the behavior."
      placeholder: |
        1. Open Pixel Agents panel
        2. Click '+ Agent'
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "What happens instead? Include any error messages."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / GIFs"
      description: "If applicable, add screenshots or screen recordings."

  - type: input
    id: vscode-version
    attributes:
      label: "VS Code version"
      description: "Run 'Help > About' to find your version."
      placeholder: "e.g., 1.109.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "Open Developer Tools (Help > Toggle Developer Tools) and paste any relevant console output."
      render: shell
